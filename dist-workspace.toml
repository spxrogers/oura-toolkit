[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# Don't run release.yml on pull requests. cargo-dist's default ("plan") runs a `dist plan`
# config-sanity check on every PR, but that's already covered — more thoroughly — by the
# `release-config` CI job (`just dist-check` = dist plan + generate --check + global build +
# artifact assertions), so the PR run was a redundant, "skipped"-noise duplicate. "skip" drops
# the `pull_request` trigger; releases stay fully tag-driven. Regenerate release.yml with
# `just dist-generate` after changing this (drift-guarded by `just dist-check`).
pr-run-mode = "skip"
# The installers to generate for each app. NPX-FIRST launch (CLAUDE.md → DISTRIBUTION):
# `npx -y oura-toolkit ...` runs the `oura` binary; brew / shell / powershell are the
# speed-path alternatives. PowerShell is unblocked by #24 (Windows CI leg is green).
installers = ["shell", "powershell", "npm", "homebrew"]
# The npm package that carries the CLI launcher: unscoped `oura-toolkit` (verified free;
# the @oura-toolkit scope is reserved for the SDK leaves). The plugin (#12) pins
# `npx -y oura-toolkit@<version> mcp` against this package.
npm-package = "oura-toolkit"
# Homebrew formula name + tap. `brew install spxrogers/tap/oura-toolkit`.
# PREREQUISITES (one-time, manual): the tap repo `spxrogers/homebrew-tap` must exist and
# CI needs a HOMEBREW_TAP_TOKEN secret with push access to it. Until those exist, tag-driven
# releases still build every installer artifact — only the publish jobs fail.
formula = "oura-toolkit"
tap = "spxrogers/homebrew-tap"
# NO "npm" here: dist 0.32's npm publish job is token-only (Node 20 / npm 10.x, NODE_AUTH_TOKEN),
# so the CLI npm package publishes from the standalone .github/workflows/publish-cli-npm.yml
# instead — Trusted Publishing (OIDC), no NPM_TOKEN — which runs on Release completion and
# publishes the npm tarball this config still BUILDS (the "npm" installer above) and hosts on
# the GitHub Release. Same standalone-over-custom-publish-job reasoning as crates.io (#91);
# see DECISIONS.md.
publish-jobs = ["homebrew"]
# ACCEPTED UPSTREAM RISK (adversarial review, PR #41): cargo-dist 0.32's npm installer
# (binary-install.js) downloads the platform binary from GitHub releases over https with
# NO checksum verification — unlike the shell installer and homebrew formula, which both
# verify sha256. Inherent to upstream's npm template; revisit when cargo-dist adds
# integrity checks.
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Where to host releases
hosting = "github"
# Ship the man page + shell completions in every archive (#75). Pre-generated (committed,
# drift-checked by `just gen-completions-check`) rather than built at dist time: cargo-dist's
# `include` copies existing files, and a build-time writer can't target a stable path without
# breaking the read-only crates.io publish build.
include = [
    "cli/oura-toolkit-cli/dist-assets/oura.1",
    "cli/oura-toolkit-cli/dist-assets/oura.bash",
    "cli/oura-toolkit-cli/dist-assets/oura.zsh",
    "cli/oura-toolkit-cli/dist-assets/oura.fish",
]
