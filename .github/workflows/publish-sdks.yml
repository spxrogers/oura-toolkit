# Publish the breadth SDKs on a version tag — the SDK leg of the tag-driven release (#96).
# Runs alongside release.yml (installers + Homebrew for the CLI) and publish-crates.yml
# (crates.io) on the SAME vX.Y.Z tag push, so one tag drives every distribution channel. The
# publish/build commands live in `just sdk-*` recipes (raw npm/python stay inside recipes, per
# CLAUDE.md → TASK RUNNER).
#
# One job per ecosystem — npm (TypeScript), PyPI (Python) and Go so far; Maven Central and
# NuGet land here as their own jobs once their registry prerequisites are done (#96).
# Everything is Trusted Publishing (OIDC) — NO stored token anywhere, same model as
# publish-crates.yml.
#
# Go has no registry: its job "publishes" by pushing the `sdks/go/vX.Y.Z` sub-tag that makes
# the nested module resolvable (`just sdk-publish-go`). That push MUST come from GITHUB_TOKEN:
# the sub-tag's name matches release.yml's version-tag glob (which cargo-dist can't parse), and
# GITHUB_TOKEN pushes never trigger workflows — the recursion guard keeps the sub-tag inert.
# This workflow's own tag glob is `v`-anchored (below) so it ignores sub-tags regardless.
#
# AUTH (npm): npm ≥ 11.5.1 detects the GitHub Actions OIDC environment and mints its own
# short-lived credential for `npm publish`; provenance attestations are generated
# AUTOMATICALLY on an OIDC publish (no --provenance flag, so the recipe's manual `npm login`
# fallback still works). The first publish (0.2.1) had to use NPM_TOKEN — npm can only attach
# a trusted publisher to a package that already exists — and was migrated here right after.
#
# AUTH (PyPI): the official pypa/gh-action-pypi-publish performs the OIDC exchange and
# generates PEP 740 attestations by default — that upload step is the one publish command
# that ISN'T a `just` recipe (the exchange + attestation signing are implemented inside the
# action, exactly like publish-crates.yml's crates-io-auth-action); everything it uploads is
# built and guarded by `just sdk-build-py` first. skip-existing keeps re-runs idempotent,
# matching the npm leg.
#
# ONE-TIME SETUP (npm, per package, on npmjs.com → package → Settings → Trusted Publisher →
# GitHub Actions): organization/user `spxrogers`, repository `oura-toolkit`, workflow
# `publish-sdks.yml`, environment (none), allowed actions `npm publish`. Required for
# @oura-toolkit/api and @oura-toolkit/auth. (DONE.)
# ONE-TIME SETUP (PyPI, on pypi.org → account → Publishing → add a PENDING publisher — PyPI,
# unlike npm, lets the trusted publisher be registered BEFORE the project exists and creates
# it on first publish): project `oura-toolkit`, owner `spxrogers`, repository `oura-toolkit`,
# workflow `publish-sdks.yml`, environment (none). Until configured, the pypi job fails at
# upload — the tag and every other channel still succeed.

name: Publish SDKs

on:
  push:
    tags:
      # Root version tags only, deliberately TIGHTER than release.yml's `**`-glob: `v`-anchored
      # so the `sdks/go/vX.Y.Z` sub-tag the go job pushes can never re-trigger this workflow
      # (defense in depth — the CI push is already inert via GITHUB_TOKEN).
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  # Manual backfill: publish the CURRENT workspace version outside a tag push (e.g. the first
  # run right after this workflow lands, so the already-released version's SDK packages exist
  # without waiting for the next tag). Safe to re-run any time — the recipe skips versions
  # that are already on the registry.
  workflow_dispatch:

permissions:
  id-token: write # mint the short-lived npm OIDC credential (and sign provenance)
  contents: read

concurrency:
  group: publish-sdks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    name: publish npm SDKs (${{ github.ref_name }})
    runs-on: ubuntu-latest
    # Skip prereleases (a semver prerelease tag contains a '-'), matching release.yml and
    # publish-crates.yml, which do not publish prereleases either.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          # Node 24 bundles npm ≥ 11.5.1, the floor for Trusted Publishing (Node 22 bundles
          # npm 10.x, which would silently fall back to looking for a token and fail).
          node-version: 24
          # Still required for trusted publishing per npm's docs: pins the publish registry
          # in the runner's npmrc. No NODE_AUTH_TOKEN — auth is the OIDC exchange.
          registry-url: 'https://registry.npmjs.org'
      - uses: extractions/setup-just@v4
      - name: Assert npm supports Trusted Publishing (>= 11.5.1)
        # Fail fast with a diagnosis instead of a cryptic publish-time auth error if the
        # runner image ever hands us an older npm.
        run: |
          v="$(npm --version)"
          floor="11.5.1"
          [ "$(printf '%s\n%s\n' "$floor" "$v" | sort -V | head -n1)" = "$floor" ] \
            || { echo "::error::npm ${v} < ${floor} — too old for Trusted Publishing (OIDC). Bump node-version (Node 24+ bundles npm 11.5.1+)."; exit 1; }
          echo "npm ${v} OK"
      - name: Publish @oura-toolkit/api + @oura-toolkit/auth (OIDC + provenance)
        run: just sdk-publish-ts

  pypi:
    name: publish PyPI SDK (${{ github.ref_name }})
    runs-on: ubuntu-latest
    # Same prerelease skip as the npm job.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          # Same pin as CI's sdk job; the dist is pure-python (py3-none-any).
          python-version: '3.12'
      - uses: extractions/setup-just@v4
      - name: Build sdist + wheel (guarded)
        # twine metadata check + wheel-content guards (py.typed markers, LICENSE, no stray
        # top-level packages) — the upload below ships exactly this output.
        run: just sdk-build-py
      - name: Publish oura-toolkit to PyPI (OIDC + PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: codegen/build/py-dist
          # Idempotent re-runs (a re-run after a partial failure must not trip over the
          # version already being on the registry) — the npm leg's skip-if-published.
          skip-existing: true

  go:
    name: publish Go SDK (${{ github.ref_name }})
    runs-on: ubuntu-latest
    # Job-level: pushing the sub-tag needs contents write (the workflow default is read).
    permissions:
      contents: write
    # Same prerelease skip as the other jobs.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      # persist-credentials (the checkout default) leaves GITHUB_TOKEN as the push credential —
      # load-bearing here: that's what keeps the sub-tag push from triggering any workflow.
      - uses: actions/checkout@v7
      - uses: extractions/setup-just@v4
      - name: Tag sdks/go/vX.Y.Z at the released commit
        run: just sdk-publish-go
