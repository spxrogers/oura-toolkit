# Publish the Rust crates to crates.io on a version tag — the crates.io leg of the tag-driven
# release (#91). Runs alongside release.yml (installers + npm/Homebrew) on the SAME vX.Y.Z tag
# push, so one tag now drives every distribution channel. The `cargo publish` calls live in
# `just publish` (raw cargo stays inside recipes, per CLAUDE.md → TASK RUNNER).
#
# AUTH: crates.io Trusted Publishing (OIDC) — NO stored CARGO_REGISTRY_TOKEN. A standalone
# workflow (not a cargo-dist custom publish job) so the OIDC claim's workflow filename is
# unambiguously `publish-crates.yml` and release.yml stays dist-generated + drift-clean.
#
# ONE-TIME SETUP (per crate, on crates.io → crate → Settings → Trusted Publishing → add GitHub):
#   owner `spxrogers`, repository `oura-toolkit`, workflow `publish-crates.yml`, environment (none).
# Required for oura-toolkit-api, oura-toolkit-auth, oura-toolkit-cli. Until configured, this job
# fails at the auth step — the tag, release.yml, npm and Homebrew all still succeed.

name: Publish crates

on:
  push:
    tags:
      # Same version-tag shape as release.yml.
      - '**[0-9]+.[0-9]+.[0-9]+*'

permissions:
  id-token: write # mint the short-lived crates.io OIDC token
  contents: read

concurrency:
  group: publish-crates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-crates:
    name: publish crates.io (${{ github.ref_name }})
    runs-on: ubuntu-latest
    # Skip prereleases (a semver prerelease tag contains a '-'), matching release.yml, which
    # does not publish npm/Homebrew for prereleases either.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: extractions/setup-just@v4
      - uses: Swatinem/rust-cache@v2
      - name: Mint a crates.io token via Trusted Publishing (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - name: Publish api -> auth -> cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: just publish
