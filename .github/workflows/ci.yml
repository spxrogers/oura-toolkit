# CI for oura-toolkit (#13).
#
# The test job invokes `just ci` and NOTHING else — every build/test/lint step lives in the
# root justfile, never duplicated in this YAML (see CLAUDE.md → TASK RUNNER). The other jobs
# likewise only run just recipes; the only raw commands in this file install toolchains, which
# issue #13 explicitly carves out (and the pinned codegen toolchains route even those through
# `just install-nightly-rustfmt` / `just install-progenitor` so their versions stay single-sourced).
#
# Matrix covers ubuntu/macos/windows per the #13 addendum: the CLI ships installers for all
# three OSes (#11), so all three must compile and pass tests — including the cfg(not(unix))
# paths that a single-OS CI would never build.

name: CI

# PR-only by owner decision: CI is the merge gate, and a pull_request run already tests
# the prospective merge result — re-running on the push to main would duplicate compute.
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    # bash everywhere (including Windows) so just's sh-flavored recipes behave identically.
    shell: bash

jobs:
  ci:
    name: just ci (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: extractions/setup-just@v4
      - uses: Swatinem/rust-cache@v2
      - run: just ci

  # Release-gate coverage floor on the hand-written crates (see CLAUDE.md → TESTING &
  # VERIFICATION). Its own job so the test matrix stays exactly `just ci`.
  coverage:
    name: coverage floor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - uses: extractions/setup-just@v4
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - run: just coverage

  # Regenerates EVERY generated SDK client (Rust via progenitor; TS/Python/Go/Java/C# via
  # openapi-generator) from the vendored spec and fails if any committed copy differs —
  # catches hand-edits to generated dirs, spec/overlay drift, and non-deterministic codegen.
  # node + java (for openapi-generator's jar) are preinstalled on ubuntu-latest.
  gen-drift:
    name: generated-code drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: extractions/setup-just@v4
      - uses: Swatinem/rust-cache@v2
      - name: Cache cargo-progenitor
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/cargo-progenitor
          key: cargo-progenitor-${{ runner.os }}-v1
      - name: Install codegen toolchain (pinned nightly rustfmt + progenitor)
        # Toolchain installation only (the #13 carve-out). `just install-nightly-rustfmt` installs
        # the DATED nightly pinned in the justfile (single source, #50) — so gen-check can't flake
        # when the floating `nightly` shifts rustfmt behavior. The command guard keeps the cached
        # cargo-progenitor binary from being rebuilt on every run; bump the cache key to force it.
        run: |
          just install-nightly-rustfmt
          command -v cargo-progenitor >/dev/null || just install-progenitor
      - run: just gen-check

  # The generated breadth clients must actually COMPILE (release gate: a client that
  # doesn't build is drift CI didn't see). The five toolchains are PINNED via setup actions
  # (#50) rather than relying on ubuntu-latest's floating preinstalled versions, so a runner-image
  # bump can't silently shift compiler behavior. Versions mirror the manifests: Go from
  # sdks/go/go.mod (single source), Java 11 target (temurin 17 host), .NET 8+10 (the C# TFMs),
  # Node 18+ (pin 22), Python 3.9+ (pin 3.12). No network beyond package registries.
  sdk-compile:
    name: breadth-SDK compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: extractions/setup-just@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdks/go/go.mod
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - run: just sdk-check
      - run: just sdk-test-py
      - run: just sdk-test-go
      - run: just sdk-test-ts
      - run: just sdk-test-java
      - run: just sdk-test-csharp

  # Issue #61: the C# netstandard2.0 asset carries `#if NETSTANDARD2_0` code (Polyfills, the
  # libc open(2)+write(2)+fsync(2) store path, the HttpClientHandler transport) that the
  # sdk-compile job's modern test host (net8.0/net10.0) compiles but can never LOAD, let alone
  # run. This leg runs the same xunit suite for net472 under Mono — which resolves and executes
  # that very asset — closing the "compiles != runs on its platform" gap (CLAUDE.md → TESTING
  # rule 6). Only the raw toolchain install (mono, the #13 carve-out) lives here; the leg is a
  # just recipe. Its own job so the sdk-compile matrix stays exactly the modern recipes.
  csharp-netstandard:
    name: C# netstandard2.0 leg (Mono)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: extractions/setup-just@v4
      - uses: actions/setup-dotnet@v4
        # Pinned to match sdk-compile (#50); the net472 leg needs a modern SDK to build against
        # the netstandard2.0 asset (reference assemblies come from NuGet).
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Install Mono
        # Toolchain install only (the #13 carve-out).
        run: |
          sudo apt-get update
          sudo apt-get install -y mono-devel
      - run: just sdk-test-csharp-netstandard

  # Validates the dist release config (a broken dist-workspace.toml must fail PRs, not
  # the release tag), proves the publishable crates build from their PACKAGED form —
  # the crates.io context with no repo root (the #11 publish-blocker guard), guards the
  # plugin manifests (schema-valid under --strict, #12), and runs the single version-drift
  # guard: every hand-written manifest equals the workspace version (#59).
  release-config:
    name: release config (dist plan + package)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: extractions/setup-just@v4
      - uses: Swatinem/rust-cache@v2
      - run: just version-check
      - name: Install dist
        # Prebuilt installer, pinned to the version in dist-workspace.toml.
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh | sh
      - run: just dist-check
      - run: just publish-check
      - name: Install claude CLI (plugin/marketplace schema validation)
        # Pinned like dist above: schema drift arrives via deliberate bumps, not
        # surprise CI breakage on unrelated PRs.
        run: npm install -g @anthropic-ai/claude-code@2.1.199
      - run: just plugin-check
