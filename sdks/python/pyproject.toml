# oura-toolkit (Python) — the SINGLE PyPI distribution (CLAUDE.md → NAMING): the generated
# client ships as the `oura_toolkit.api` submodule; the hand-written auth companion will join
# it as `oura_toolkit.auth` in this same distribution. HAND-WRITTEN: `just gen-py` regenerates
# only oura_toolkit/api/. The version is written by `just set-version` and guarded by
# `just version-check` (#59) — never edit it by hand.
[project]
name = "oura-toolkit"
version = "0.2.1"
description = "Oura Ring API v2 client (generated from Oura's OpenAPI spec) — part of oura-toolkit"
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "spxrogers" }]
requires-python = ">=3.9"
keywords = ["oura", "oura-ring", "openapi"]
# Dependency set of the generated `python` (urllib3) client — see codegen/python.yaml.
dependencies = [
  "urllib3 (>=2.1.0,<3.0.0)",
  "python-dateutil (>=2.8.2)",
  "pydantic (>=2)",
  "typing-extensions (>=4.7.1)",
]

[project.urls]
Repository = "https://github.com/spxrogers/oura-toolkit"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["oura_toolkit*"]

# PEP 561 marker files are NOT auto-included by setuptools; without this they are dropped
# from the built wheel and downstream type-checkers ignore the package. Ship the marker
# for both the generated client and the hand-written auth companion (tripwire-tested
# against the INSTALLED package in tests/test_py_typed.py).
[tool.setuptools.package-data]
"oura_toolkit.api" = ["py.typed"]
"oura_toolkit.auth" = ["py.typed"]
