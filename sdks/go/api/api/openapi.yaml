- description: The daily stress route includes a summary of the number of minutes
    the user spends in high stress and high recovery each day. This is a great way
    to see how your stress and recovery are trending over time. Stress and recovery
    are mutally exclusive. E.g. one can only be stressed or recovered at any given
    moement - and cannot be stressed and recovered at the same time.
  externalDocs:
    description: Learn more about daytime stress
    url: https://ouraring.com/blog/daytime-stress-feature
  name: Daily Stress Routes
- description: |-
    The Enhanced Tags data scope includes tags that Oura users enter within the Oura mobile app. Enhanced Tags can be added for any lifestyle choice, habit, mood change, or environmental factor an Oura user wants to monitor the effects of. Enhanced Tags also contain context on a tag's start and end time, whether a tag repeats daily, and comments.

    [Learn more about how Oura users add Enhanced Tags](https://support.ouraring.com/hc/en-us/articles/360038676993-How-to-Use-Tags)
  externalDocs:
    description: More information about Enhanced Tags
    url: https://ouraring.com/blog/tags/
  name: Enhanced Tag Routes
- description: "The Heart Rate data scope includes time-series heart rate data throughout\
    \ the day and night. Heart rate is provided at 5-minute increments. For heart\
    \ rate data recorded from a Session, see Sessions endpoint."
  externalDocs:
    description: How accurate is the heart rate data generated by the Oura Ring?
    url: https://ouraring.com/blog/how-accurate-is-oura/
  name: Heart Rate Routes
- description: "The Personal Info scope includes personal information (e.g. age, email,\
    \ weight, and height) about the user. You can access the id on the personal_info\
    \ route with any access token (no scopes are required)."
  name: Personal Info Routes
- description: "The Rest Mode scope includes information about rest mode periods.\
    \ This includes the start, end time and detaials of the rest mode period."
  name: Rest Mode Period Routes
- description: "The Ring Configuration scope includes information about the user's\
    \ ring(s). This includes the model, size, color, etc."
  name: Ring Configuration Routes
- description: "The Sessions data scope provides information on how users engage with\
    \ guided and unguided sessions in the Oura app, including the user's biometric\
    \ trends during the sessions."
  externalDocs:
    description: Learn about the available session types within the Explore Tab
    url: https://ouraring.com/blog/oura-explore-tab/
  name: Session Routes
- description: Returns Oura Sleep data for the specified Oura user within a given
    timeframe. A user can have multiple sleep periods per day.
  name: Sleep Routes
- description: Recommendations for the optimal bedtime window that is calculated based
    on sleep data.
  name: Sleep Time Routes
- description: |-
    <span className='text-important'>**Note:** Tag is deprecated. We recommend transitioning to [Enhanced Tag](#tag/Enhanced-Tag-Routes).</span>

    ~~The Tags data scope includes tags that Oura users enter within the Oura mobile app. Tags are a growing list of activities, environment factors, symptoms, emotions, and other aspects that provide broader context into what's happening with users beyond the objective data generated by the Oura Ring.~~

    ~~[More information on tag translations](https://cloud.ouraring.com/edu/tag-translations)~~
  name: Tag Routes
- description: "VO2 Max is a measure of the maximum volume of oxygen that an individual\
    \ can use during intense exercise. See more details [here](https://support.ouraring.com/hc/en-us/articles/28336620578835-Cardio-Capacity-VO2-Max)."
  name: VO2 Max Routes
- description: "The Workout data scope includes information about user workouts. This\
    \ is a diverse, growing list of workouts that help inform how the user is training\
    \ and exercising."
  name: Workout Routes
- description: Fake user data that you can access without an Oura account. There is
    a corresponding sandbox endpoint to each available data type. This is useful for
    testing and development purposes. The data is not real and should not be used
    for any production purposes. The data is generated by Oura and is not based on
    any real user data. The data is not updated in real-time and is not guaranteed
    to be accurate. The rate limit for the sandbox endpoints is shared with your rate
    limit on other data endpoints.
  name: Sandbox Routes
- description: "# Webhooks for Real-Time Data Updates\n\n## What are Webhooks?\nWebhooks\
    \ are a way for the Oura API to notify your application when new data is available,\
    \ instead of requiring your application to constantly check for updates (polling).\
    \ Think of webhooks as \"reverse APIs\" - instead of your application requesting\
    \ data, Oura's servers send data to your application when something changes.\n\
    \n## Why Use Webhooks (Important!)\n- **RECOMMENDED APPROACH**: Webhooks are the\
    \ preferred way to consume Oura data\n- **Avoid Rate Limits**: We have not had\
    \ customers hit rate limits with webhooks properly implemented\n- **Near Real-Time\
    \ Updates**: Webhook notifications come approximately 30 seconds after data syncs\
    \ from the mobile app\n- **Efficient Resource Usage**: Reduces unnecessary API\
    \ calls and server load\n- **Better User Experience**: Your application stays\
    \ updated without constant polling\n\n## How Webhooks Work with Oura\n1. **You\
    \ set up an endpoint**: Create a URL on your server that can receive POST requests\n\
    2. **You subscribe to events**: Tell Oura what data types and events you want\
    \ to be notified about\n3. **Oura verifies your endpoint**: A one-time check to\
    \ ensure your endpoint is valid\n4. **Oura sends notifications**: When data changes,\
    \ Oura sends a POST request to your endpoint\n5. **You process the event**: Your\
    \ endpoint receives basic event details\n6. **You fetch complete data**: Use the\
    \ provided IDs to retrieve the full data via the API\n\n## Recommended Implementation\
    \ Pattern\n1. **Initial Data Load**: When a user first connects, make a single\
    \ API request for historical data\n2. **Subscribe to Webhooks**: Set up webhook\
    \ subscriptions for all data types you need\n3. **Process Webhook Events**: As\
    \ users sync their rings, you'll receive notifications about new data\n4. **Fetch\
    \ Updated Data**: Use the object_id from webhook events to fetch the specific\
    \ updated data\n\nThis pattern minimizes API calls while ensuring your application\
    \ always has the latest data.\n\n## Setup Guide\n\n### Step 1: Create Your Webhook\
    \ Endpoint\nSet up an HTTP endpoint on your server that can:\n- Handle both GET\
    \ requests (for verification) and POST requests (for events)\n- Respond to verification\
    \ challenges during subscription setup\n- Process incoming webhook events quickly\
    \ (under 10 seconds)\n\nExample endpoint implementation (Node.js):\n```javascript\n\
    // Express.js route handlers for your webhook endpoint\napp.get('/oura-webhook',\
    \ (req, res) => {\n  // Verification handler - required during subscription setup\n\
    \  const { verification_token, challenge } = req.query;\n\n  // Verify the token\
    \ matches your expected token\n  if (verification_token === YOUR_VERIFICATION_TOKEN)\
    \ {\n    // Return the challenge in the required format\n    return res.json({\
    \ challenge });\n  }\n\n  // If verification fails\n  return res.status(401).send('Invalid\
    \ verification token');\n});\n\napp.post('/oura-webhook', (req, res) => {\n  //\
    \ Event handler - processes incoming webhook events\n\n  // Always respond quickly\
    \ (under 10 seconds)\n  // Process the event asynchronously if needed\n  res.status(200).send('OK');\n\
    \n  // Then process the event data\n  const { event_type, data_type, object_id,\
    \ user_id } = req.body;\n  processEventAsync(event_type, data_type, object_id,\
    \ user_id);\n});\n```\n\n### Step 2: Create a Webhook Subscription\nCall the `POST\
    \ /v2/webhook/subscription` endpoint to register your webhook:\n\n```\nPOST /v2/webhook/subscription\n\
    Headers:\n  x-client-id: YOUR_CLIENT_ID\n  x-client-secret: YOUR_CLIENT_SECRET\n\
    \  Content-Type: application/json\n\nBody:\n{\n  \"callback_url\": \"https://your-server.com/oura-webhook\"\
    ,\n  \"verification_token\": \"your-secret-verification-token\",\n  \"event_type\"\
    : \"update\",\n  \"data_type\": \"sleep\"\n}\n```\n\nYou need to create separate\
    \ subscriptions for each combination of:\n- **event_type**: The type of event\
    \ (create, update, delete)\n- **data_type**: The type of data you're interested\
    \ in (sleep, activity, etc.)\n\n### Step 3: Verification Process\nWhen you create\
    \ a subscription, Oura verifies your endpoint:\n\n1. Oura sends a GET request\
    \ to your callback URL with query parameters:\n   ```\n   GET https://your-server.com/oura-webhook?verification_token=your-token&challenge=random-string\n\
    \   ```\n\n2. Your endpoint must verify the token and respond with the challenge:\n\
    \   ```json\n   {\n     \"challenge\": \"random-string\"\n   }\n   ```\n\n3. If\
    \ verification succeeds, your subscription is activated\n\n![Verification Flow](/img/webhook-verification-flow-diagram.drawio.png)\n\
    \n### Step 4: Receiving and Processing Events\nWhen an event occurs (e.g., user\
    \ syncs new sleep data):\n\n1. Oura sends a POST request to your callback URL:\n\
    \   ```\n   POST https://your-server.com/oura-webhook\n   Headers:\n     x-oura-signature:\
    \ HMAC_SIGNATURE\n     x-oura-timestamp: 1234567890\n\n   Body:\n   {\n     \"\
    event_type\": \"update\",\n     \"data_type\": \"sleep\",\n     \"object_id\"\
    : \"12345abc\",\n     \"event_time\": \"2023-01-01T08:00:00+00:00\",\n     \"\
    user_id\": \"user123\"\n   }\n   ```\n\n2. Your endpoint should:\n   - Verify\
    \ the signature for security (see below)\n   - Respond quickly (under 10 seconds)\
    \ with a 2xx status\n   - Process the event asynchronously if needed\n   - Use\
    \ the object_id to fetch the complete data via the API\n\n## Security Best Practices\n\
    \n### Verify Webhook Signatures\nAlways verify that webhook requests are actually\
    \ from Oura by checking the HMAC signature:\n\n```javascript\nconst crypto = require('crypto');\n\
    \nfunction verifySignature(headers, body, clientSecret) {\n  const signature =\
    \ headers['x-oura-signature'];\n  const timestamp = headers['x-oura-timestamp'];\n\
    \n  // Create HMAC using your client secret\n  const hmac = crypto.createHmac('sha256',\
    \ clientSecret);\n  hmac.update(timestamp + JSON.stringify(body));\n  const calculatedSignature\
    \ = hmac.digest('hex').toUpperCase();\n\n  // Compare calculated signature with\
    \ received signature\n  return calculatedSignature === signature;\n}\n\n// In\
    \ your webhook handler\napp.post('/oura-webhook', (req, res) => {\n  // Verify\
    \ signature\n  if (!verifySignature(req.headers, req.body, CLIENT_SECRET)) {\n\
    \    return res.status(401).send('Invalid signature');\n  }\n\n  // Process valid\
    \ webhook\n  res.status(200).send('OK');\n  // ...\n});\n```\n\n### Use HTTPS\n\
    Always use HTTPS for your webhook endpoint to ensure data is encrypted in transit.\n\
    \n### Keep Your Verification Token Secret\nChoose a strong, random verification\
    \ token and don't share it.\n\n## Handling Webhook Failures\n\n### Retry Mechanism\n\
    Oura will retry failed webhook deliveries:\n- For 4xx responses: 10 retries\n\
    - For 5xx responses: 10 retries\n- For timeouts: 10 retries\n\n### Canceling Subscriptions\n\
    If you want to cancel a subscription, you can:\n- Use the DELETE endpoint: `DELETE\
    \ /v2/webhook/subscription/{id}`\n- Or respond with a 410 status code to automatically\
    \ cancel\n\n## Common Questions\n\n### How quickly will I receive webhooks?\n\
    Webhook notifications arrive approximately 30 seconds after data syncs from the\
    \ mobile app. The timing depends on the data type:\n- **Sleep, Readiness, and\
    \ other user-initiated sync data**: These only sync when the user opens the Oura\
    \ app and actively syncs their ring\n- **Daily Activity, Daily Stress, and other\
    \ background data**: These may update periodically in the background without user\
    \ action\n\n### What if my server goes down?\nOura will retry webhook deliveries\
    \ for about an hour if your server doesn't respond properly. However, if your\
    \ server is down for an extended period, you might miss some events. It's a good\
    \ practice to implement a reconciliation process that can fetch data for periods\
    \ when your webhook might have been unavailable.\n\n### How can I test webhooks\
    \ locally?\nUse a tool like [ngrok](https://ngrok.com/) to expose your local development\
    \ server to the internet with a public URL.\n\n### Can I use the same callback\
    \ URL for different subscriptions?\nYes, you can use the same URL for multiple\
    \ subscriptions. Your handler can differentiate between events using the `event_type`\
    \ and `data_type` fields in the webhook payload.\n\n### Will I hit rate limits\
    \ using webhooks?\nWe have not had customers hit rate limits with webhooks properly\
    \ implemented. The recommended pattern is:\n1. Make a single request for historical\
    \ data when a user first connects\n2. Use webhooks for all ongoing data updates\n\
    3. Only fetch the specific data that has changed based on webhook notifications\n\
    \nThis approach minimizes API calls while ensuring your application always has\
    \ the latest data.\n        "
  name: Webhook Subscription Routes
